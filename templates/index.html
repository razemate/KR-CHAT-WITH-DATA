<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS DB Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* === Design Tokens (Analytical Canvas) === */
        :root {
            --surface:           #f8f9fa;
            --surface-lowest:    #ffffff;
            --surface-container: #edeeef;
            --surface-highest:   #e1e3e4;
            --primary:           #004ac6;
            --primary-mid:       #2563eb;
            --on-surface:        #191c1d;
            --secondary:         #6c757d;
            --shadow-ambient:    0px 10px 40px rgba(25,28,29,0.07);
            --radius-pill:       1.5rem;
            --radius-md:         0.75rem;
            --radius-sm:         0.5rem;
            --transition:        200ms ease-in-out;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; background: var(--surface-lowest); color: var(--on-surface); display: flex; }

        /* --- Sidebar --- */
        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background: var(--surface);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 0.75rem;
        }

        .sidebar-logo { padding: 0 0.75rem 1.5rem; }
        .sidebar-logo h1 { font-family: 'Manrope', sans-serif; font-size: 1.2rem; font-weight: 800; color: var(--on-surface); letter-spacing: -0.03em; }
        .sidebar-logo span { font-size: 0.65rem; font-weight: 500; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.05em; }

        .btn-new-chat {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.65rem 1rem; margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-mid));
            color: #fff; font-size: 0.8rem; font-weight: 600;
            border: none; border-radius: var(--radius-md); cursor: pointer;
            width: 100%; transition: opacity var(--transition);
        }
        .btn-new-chat:hover { opacity: 0.88; }

        .nav-section { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .nav-link {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.6rem 0.75rem; border-radius: var(--radius-sm);
            color: var(--secondary); font-size: 0.85rem; font-weight: 500;
            cursor: pointer; transition: background var(--transition), color var(--transition);
        }
        .nav-link:hover { background: var(--surface-container); color: var(--on-surface); }
        .nav-link.active { background: #dbeafe; color: var(--primary); }
        .nav-link svg { width: 18px; height: 18px; flex-shrink: 0; }

        .sidebar-bottom { margin-top: auto; display: flex; flex-direction: column; gap: 2px; }

        /* --- Main Area --- */
        .main { flex: 1; height: 100vh; display: flex; flex-direction: column; background: var(--surface-lowest); min-width: 0; }

        /* Top bar */
        .topbar {
            height: 60px; flex-shrink: 0;
            display: flex; align-items: center;
            padding: 0 1.5rem; gap: 1rem;
            background: var(--surface-lowest);
        }
        .search-pill {
            flex: 1; max-width: 420px;
            display: flex; align-items: center; gap: 0.5rem;
            background: var(--surface); border-radius: 999px;
            padding: 0.5rem 1rem; cursor: text;
        }
        .search-pill svg { width: 14px; height: 14px; color: var(--secondary); flex-shrink: 0; }
        .search-pill input {
            border: none; background: transparent; outline: none;
            font-size: 0.8rem; color: var(--on-surface); width: 100%;
        }
        .search-pill input::placeholder { color: var(--secondary); }
        .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 1rem; }
        .topbar-btn { background: none; border: none; cursor: pointer; color: var(--secondary); transition: color var(--transition); }
        .topbar-btn:hover { color: var(--primary); }
        .topbar-btn svg { width: 18px; height: 18px; display: block; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; background: #334155; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .avatar svg { width: 16px; height: 16px; }

        /* Message area */
        .message-area {
            flex: 1; overflow-y: auto;
            padding: 1rem 1rem 6rem;
            display: flex; flex-direction: column; gap: 0.8rem;
            scroll-behavior: smooth;
        }
        .message-area::-webkit-scrollbar { width: 5px; }
        .message-area::-webkit-scrollbar-thumb { background: var(--surface-container); border-radius: 999px; }

        .msg-row-user { display: flex; justify-content: flex-end; }
        .msg-row-ai   { display: flex; align-items: flex-start; gap: 0.75rem; max-width: 90%; }

        .bubble-user {
            background: linear-gradient(135deg, var(--primary), var(--primary-mid));
            color: #fff; border-radius: var(--radius-md) var(--radius-md) 0 var(--radius-md);
            padding: 0.6rem 1rem; max-width: 75%;
            font-size: 0.85rem; line-height: 1.5;
        }
        .bubble-user-time { font-size: 0.6rem; text-transform: uppercase; opacity: 0.75; margin-top: 0.4rem; }

        .ai-icon {
            width: 32px; height: 32px; flex-shrink: 0;
            background: var(--primary); color: #fff;
            border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
            margin-top: 2px;
        }
        .ai-icon svg { width: 16px; height: 16px; }

        .bubble-ai {
            background: var(--surface);
            border-radius: 0 var(--radius-md) var(--radius-md) var(--radius-md);
            padding: 0.8rem 1rem; flex: 1;
            font-size: 0.85rem; line-height: 1.5;
        }
        .bubble-ai h1, .bubble-ai h2, .bubble-ai h3 {
            font-family: 'Manrope', sans-serif; letter-spacing: -0.02em;
            font-weight: 700; margin-bottom: 0.4rem;
        }
        .bubble-ai h2 { font-size: 1.05rem; }
        .bubble-ai p { margin-bottom: 0.5rem; }
        .bubble-ai p:last-child { margin-bottom: 0; }
        .bubble-ai ul { list-style: disc; margin-left: 1.5rem; margin-bottom: 0.5rem; }
        .bubble-ai li { margin-bottom: 0.2rem; }
        .bubble-ai strong { color: var(--on-surface); }
        .bubble-ai a { color: var(--primary); text-decoration: underline; }

        .typing { color: var(--secondary); font-size: 0.8rem; font-style: italic; }

        /* --- Input area (floating pill) --- */
        .input-wrap {
            position: absolute; bottom: 0; left: 240px; right: 0;
            padding: 0 1rem 1.25rem;
            background: linear-gradient(to top, #fff 75%, rgba(255,255,255,0));
            pointer-events: none;
        }
        .input-pill {
            pointer-events: all;
            max-width: 720px; margin: 0 auto;
            display: flex; align-items: flex-end; gap: 0.5rem;
            background: var(--surface-lowest);
            border: 1px solid rgba(195,198,215,0.3);
            border-radius: var(--radius-pill);
            padding: 0.5rem 0.75rem;
            box-shadow: var(--shadow-ambient);
            transition: border-color var(--transition), box-shadow var(--transition);
        }
        .input-pill:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37,99,235,0.08), var(--shadow-ambient);
        }
        .attach-btn {
            background: none; border: none; cursor: pointer;
            color: var(--secondary); padding: 6px; border-radius: 50%;
            display: flex; transition: color var(--transition), background var(--transition);
            flex-shrink: 0; align-self: flex-end; margin-bottom: 2px;
        }
        .attach-btn:hover { color: var(--primary); background: var(--surface-container); }
        .attach-btn svg { width: 18px; height: 18px; }

        #chatInput {
            flex: 1; border: none; outline: none; background: transparent;
            font-family: inherit; font-size: 0.875rem; color: var(--on-surface);
            resize: none; min-height: 40px; max-height: 140px;
            padding: 0.6rem 0; line-height: 1.55;
        }
        #chatInput::placeholder { color: var(--secondary); }

        .send-btn {
            width: 36px; height: 36px; flex-shrink: 0; align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--primary-mid));
            color: #fff; border: none; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity var(--transition);
            margin-bottom: 2px;
        }
        .send-btn:hover { opacity: 0.88; }
        .send-btn:disabled { background: var(--surface-container); color: var(--secondary); cursor: not-allowed; opacity: 1; }
        .send-btn svg { width: 15px; height: 15px; }

        .input-hint { max-width: 720px; margin: 0.4rem auto 0; text-align: center; font-size: 0.67rem; color: var(--secondary); }

        /* file preview (ChatGPT style) */
        .file-pills { max-width: 720px; margin: 0 auto 0.5rem; display: flex; flex-wrap: wrap; gap: 0.6rem; }
        .file-pill {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: var(--surface-highest); border: 1px solid rgba(0,0,0,0.06);
            border-radius: var(--radius-md); padding: 0.4rem 0.6rem; 
            font-size: 0.75rem; color: var(--on-surface); font-weight: 500;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .file-pill .file-icon { width: 32px; height: 32px; background: #fff; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--primary); }
        .file-pill .file-info { display: flex; flex-direction: column; }
        .file-pill .file-name { max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-pill .file-type { font-size: 0.6rem; color: var(--secondary); text-transform: uppercase; }
        .file-pill button { background: none; border: none; cursor: pointer; color: var(--secondary); font-size: 1.1rem; line-height: 1; margin-left: 0.2rem; padding: 2px; border-radius: 50%; display: flex; transition: background 0.2s, color 0.2s; }
        .file-pill button:hover { background: rgba(0,0,0,0.08); color: #ef4444; }

        /* Image Preview */
        .img-preview { width: 32px; height: 32px; object-fit: cover; border-radius: 4px; }

        /* Auth Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff; padding: 2rem; border-radius: var(--radius-md);
            width: 100%; max-width: 400px; box-shadow: var(--shadow-ambient);
        }
        .modal-content h2 { font-family: 'Manrope', sans-serif; margin-bottom: 1rem; }
        .modal-content input {
            width: 100%; padding: 0.75rem; margin-bottom: 1rem;
            border: 1px solid var(--surface-highest); border-radius: var(--radius-sm);
            font-size: 0.9rem;
        }
        .modal-content button {
            width: 100%; padding: 0.75rem;
            background: var(--primary); color: #fff; border: none;
            border-radius: var(--radius-sm); font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Auth Modal -->
    <div id="authModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Sign In</h2>
            <p style="margin-bottom: 1rem; color: var(--secondary); font-size: 0.85rem;">Enter your email to start chatting.</p>
            <input type="email" id="emailInput" placeholder="email@example.com" value="admin@example.com">
            <button onclick="login()">Sign In</button>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <h1>CS DB Chat</h1>
            <span>V2.4.0</span>
        </div>

        <button class="btn-new-chat" onclick="resetChat()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
            New Chat
        </button>

        <nav class="nav-section">
            <div class="nav-link active">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                History
            </div>
        </nav>

        <div class="sidebar-bottom">
            <div class="nav-link">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Settings
            </div>
            <div class="nav-link" onclick="logout()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Log Out
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main class="main" style="position:relative;">
        <!-- Top bar -->
        <header class="topbar">
            <div class="search-pill">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input type="text" placeholder="Ask about your data...">
            </div>
            <div class="topbar-actions">
                <button class="topbar-btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                </button>
                <button class="topbar-btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                </button>
                <div class="avatar" id="userAvatar">
                    <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
                </div>
            </div>
        </header>

        <!-- Chat messages -->
        <div id="messageArea" class="message-area">
            <!-- Welcome AI message -->
            <div class="msg-row-ai">
                <div class="ai-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                </div>
                <div class="bubble-ai">
                    <p>Hello! How can I assist you today?</p>
                </div>
            </div>
        </div>

        <!-- Floating input pill -->
        <div class="input-wrap">
            <div id="filePills" class="file-pills"></div>
            <div class="input-pill">
                <button class="attach-btn" onclick="document.getElementById('fileUpload').click()" title="Attach file">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.414a4 4 0 00-5.656-5.656l-6.415 6.414a6 6 0 108.486 8.486L20.5 13"/></svg>
                </button>
                <input type="file" id="fileUpload" style="display:none" multiple onchange="handleFileSelect(event)">
                <textarea id="chatInput" placeholder="Type a follow-up question..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                </button>
            </div>
            <p class="input-hint">CS DB Chat can make mistakes. Verify important information.</p>
        </div>
    </main>

    <script>
        let conversationId = null;
        let currentFiles = [];

        // Check for auth cookie
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        function checkAuth() {
            const email = getCookie("vanna_email");
            if (!email) {
                document.getElementById('authModal').style.display = 'flex';
            } else {
                document.getElementById('authModal').style.display = 'none';
                console.log("Authenticated as:", email);
            }
        }

        function login() {
            const email = document.getElementById('emailInput').value.trim();
            if (email) {
                document.cookie = `vanna_email=${email}; path=/; max-age=86400`;
                checkAuth();
            }
        }

        function logout() {
            document.cookie = "vanna_email=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC;";
            location.reload();
        }

        checkAuth();

        // Auto-resize textarea
        const textarea = document.getElementById('chatInput');
        textarea.addEventListener('input', () => {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 140) + 'px';
        });
        textarea.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        function now() {
            return new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }

        function handleFileSelect(e) {
            for (const f of e.target.files) currentFiles.push(f);
            e.target.value = '';
            renderPills();
        }
        function removeFile(name) {
            currentFiles = currentFiles.filter(f => f.name !== name);
            renderPills();
        }
        function renderPills() {
            const c = document.getElementById('filePills');
            c.innerHTML = currentFiles.map(f => {
                const isImg = f.type.startsWith('image/');
                const iconUrl = isImg ? URL.createObjectURL(f) : '';
                const iconHtml = isImg ? `<img src="${iconUrl}" class="img-preview">` : `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>`;
                const typeTxt = f.name.split('.').pop() || 'FILE';
                return `
                <span class="file-pill">
                    <div class="file-icon">${iconHtml}</div>
                    <div class="file-info">
                        <span class="file-name">${f.name}</span>
                        <span class="file-type">${typeTxt.substring(0,4)}</span>
                    </div>
                    <button class="remove-btn" onclick="removeFile('${f.name}')">×</button>
                </span>`;
            }).join('');
        }

        // Paste event for images
        document.addEventListener('paste', e => {
            if (e.clipboardData && e.clipboardData.files.length > 0) {
                let added = false;
                for (const f of e.clipboardData.files) {
                    if (f.type.startsWith('image/')) {
                        // Give pasted image a file name
                        const pasteFile = new File([f], `pasted_image_${Date.now()}.png`, {type: f.type});
                        currentFiles.push(pasteFile);
                        added = true;
                    }
                }
                if (added) renderPills();
            }
        });

        function appendUserMessage(text) {
            const el = document.createElement('div');
            el.className = 'msg-row-user';
            el.innerHTML = `<div class="bubble-user">${text}<div class="bubble-user-time">Sent at ${now()}</div></div>`;
            document.getElementById('messageArea').appendChild(el);
        }

        function appendAiPlaceholder() {
            const row = document.createElement('div');
            row.className = 'msg-row-ai';
            row.innerHTML = `
                <div class="ai-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                </div>
            `;
            const bubble = document.createElement('div');
            bubble.className = 'bubble-ai';
            bubble.innerHTML = '<span class="typing">Analyzing…</span>';
            row.appendChild(bubble);
            
            document.getElementById('messageArea').appendChild(row);
            return bubble;
        }

        function resetChat() {
            conversationId = null;
            currentFiles = [];
            renderPills();
            const area = document.getElementById('messageArea');
            area.innerHTML = `
                <div class="msg-row-ai">
                    <div class="ai-icon">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    </div>
                    <div class="bubble-ai">
                        <h2>CS DB Chat Analysis Platform</h2>
                        <p>Chat cleared. How can I help you?</p>
                    </div>
                </div>`;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg && currentFiles.length === 0) return;

            const area = document.getElementById('messageArea');
            const btn = document.getElementById('sendBtn');

            let fullMsg = msg;
            if (currentFiles.length > 0)
                fullMsg += '\n\n[Uploaded: ' + currentFiles.map(f => f.name).join(', ') + ']';

            appendUserMessage(msg || 'Attached files');
            input.value = ''; textarea.style.height = 'auto';
            currentFiles = []; renderPills();
            area.scrollTop = area.scrollHeight;

            input.disabled = true; btn.disabled = true;
            const aiNode = appendAiPlaceholder();

            try {
                const resp = await fetch('/api/vanna/v2/chat_sse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: fullMsg, conversation_id: conversationId })
                });

                if (!resp.ok) {
                    aiNode.innerHTML = `<span style="color:#ef4444">Server error ${resp.status}. Please try again.</span>`;
                    return;
                }

                const reader = resp.body.getReader();
                const dec = new TextDecoder();
                let accum = '';
                let buffer = '';
                let done = false;
                let renderTimer = null;

                function renderMarkdown() {
                    const shouldScroll = (area.scrollHeight - area.scrollTop - area.clientHeight) < 80;
                    aiNode.innerHTML = marked.parse(accum);
                    if (shouldScroll) area.scrollTop = area.scrollHeight;
                }

                function scheduleRender() {
                    if (renderTimer) return;
                    renderTimer = setTimeout(() => {
                        renderTimer = null;
                        renderMarkdown();
                    }, 60);
                }

                while (!done) {
                    const { done: streamDone, value } = await reader.read();
                    if (streamDone) break;

                    buffer += dec.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    // Keep the last (potentially incomplete) line in buffer
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const raw = line.slice(6).trim();
                        if (raw === '[DONE]') { done = true; break; }
                        if (!raw) continue;

                        try {
                            const payload = JSON.parse(raw);
                            if (payload.conversation_id) conversationId = payload.conversation_id;
                            const rich = payload.rich;
                            if (!rich) continue;

                            const type = rich.type;
                            const data = rich.data || {};

                            // Main text response
                            if (type === 'text') {
                                const chunk = data.content || '';
                                if (chunk) {
                                    accum += chunk;
                                    scheduleRender();
                                }
                            }

                            // DataFrame/Table result from a DB query → render as markdown table
                            else if (type === 'dataframe' || type === 'table') {
                                const rows = data.data || data.rows || [];
                                const cols = data.columns || (rows.length > 0 ? Object.keys(rows[0]) : []);
                                if (cols.length > 0 && rows.length > 0) {
                                    let md = '| ' + cols.join(' | ') + ' |\n';
                                    md += '| ' + cols.map(() => '---').join(' | ') + ' |\n';
                                    for (const row of rows.slice(0, 50)) {
                                        md += '| ' + cols.map(c => String(row[c] ?? '')).join(' | ') + ' |\n';
                                    }
                                    if (rows.length > 50) md += `\n*Showing 50 of ${rows.length} rows.*\n`;
                                    accum = md;
                                } else if (rows.length === 0) {
                                    accum = '_No results found._';
                                } else {
                                    accum = JSON.stringify(data).substring(0, 500);
                                }
                                renderMarkdown();
                            }

                            // Code block (SQL display)
                            else if (type === 'code_block') {
                                // skip — don't show raw SQL to user
                            }

                            // Error from agent (status_card with status=error)
                            else if (type === 'status_card' && data.status === 'error') {
                                const errMsg = data.description || data.title || 'An error occurred.';
                                accum = `⚠️ ${errMsg}`;
                                aiNode.innerHTML = `<span style="color:#ef4444">${accum}</span>`;
                                area.scrollTop = area.scrollHeight;
                            }

                            // Notification / alert
                            else if (type === 'notification' || type === 'alert') {
                                const txt = data.message || data.content || '';
                                if (txt && !accum) {
                                    accum = txt;
                                    renderMarkdown();
                                }
                            }
                            // All other types (status_bar_update, task_tracker_update, etc.) are ignored silently

                        } catch (_) { /* ignore parse errors */ }
                    }
                }

                // If stream ended but we never got any content, show a fallback
                if (!accum) {
                    aiNode.innerHTML = '<span style="color:#6c757d"><em>No response received. Please try again.</em></span>';
                }

            } catch (err) {
                aiNode.innerHTML = '<span style="color:#ef4444">Could not connect to server. Please check your connection and try again.</span>';
            } finally {
                input.disabled = false; btn.disabled = false;
                input.focus();
            }
        }
    </script>
</body>
